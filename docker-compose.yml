version: '3.8'

services:
  charon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: charon-engine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist SQLite database
      - charon-data:/app/data
      # Optional: mount logs
      - charon-logs:/app/logs
    networks:
      - charon-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # Mobile dashboard — separate read-mostly process. Crash-isolated from the
  # trading agent; opens the same SQLite file (WAL-safe concurrent reader).
  charon-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dashboard/server.js
    container_name: charon-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/charon.db
      - DASHBOARD_HOST=0.0.0.0   # safe: only reachable inside charon-net + via cloudflared
      - DASHBOARD_PORT=3000
    volumes:
      - charon-data:/app/data    # SAME volume as the agent → same DB file
    networks:
      - charon-net
    depends_on:
      - charon

  # Cloudflare Tunnel — exposes the dashboard over HTTPS with no open inbound port.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: charon-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - charon-net
    depends_on:
      - charon-dashboard

  # Optional: Add monitoring stack
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: charon-prometheus
  #   restart: unless-stopped
  #   volumes:
  #     - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
  #     - prometheus-data:/prometheus
  #   ports:
  #     - "9090:9090"
  #   networks:
  #     - charon-net

  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: charon-grafana
  #   restart: unless-stopped
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   ports:
  #     - "3001:3000"
  #   networks:
  #     - charon-net
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  charon-data:
    driver: local
  charon-logs:
    driver: local
  # prometheus-data:
  #   driver: local
  # grafana-data:
  #   driver: local

networks:
  charon-net:
    driver: bridge
